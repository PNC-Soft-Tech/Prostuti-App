name: prostuti
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.5.1 <4.0.0"

dependencies:
  collection: ^1.18.0
  dart_quill_delta: ^10.8.3
  dartz: ^0.10.1
  flutter:
    sdk: flutter
  # flutter_launcher_icons: ^0.14.2
  # flutter_inappwebview: ^5.8.0
  flutter_quill: ^11.1.0
  flutter_quill_delta_from_html: ^1.5.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.16
  flutter_widget_from_html: ^0.15.3
  get: ^4.6.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  quill_delta: ^3.0.0-nullsafety.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: "^0.14.2"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.jpg"
flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/splash/
    - assets/logo/
    - assets/onboarding/
    - assets/icons/
    - assets/leaderboard/
    - assets/navigation/
    - assets/profile/
    - assets/rank/
