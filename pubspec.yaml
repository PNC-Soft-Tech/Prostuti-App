name: prostuti
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.5.1 <4.0.0"

dependencies:
  blur: ^4.0.0
  collection: ^1.18.0
  dart_quill_delta: ^10.8.3
  dartz: ^0.10.1
  flutter:
    sdk: flutter
  # flutter_launcher_icons: ^0.14.2
  # flutter_inappwebview: ^5.8.0
